name: バグ報告
description: 不具合・エラーを報告する
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: バグの詳細をできるだけ詳しく記入してください。

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: バグを再現するための手順を記述してください
      placeholder: |
        1. ○○ページを開く
        2. ○○ボタンをクリック
        3. エラーが発生する
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待される動作
      description: 本来どのように動作すべきか
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: 実際に何が起きているか（エラーメッセージがあれば貼り付けてください）
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 環境情報
      description: OS・ブラウザ・Node.jsバージョンなど
      placeholder: |
        - OS: Windows 11
        - Browser: Chrome 120
        - Node.js: 20.x
